<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Link Kadaluarsa</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
<style>
body { background:#f4f6fb; font-family:'Segoe UI',sans-serif; }
</style>
</head>
<body>
<div class="container py-5" style="max-width:480px;">
    <div class="card text-center p-5" style="border-radius:16px;border:none;box-shadow:0 4px 24px rgba(0,0,0,.08);">
        <div style="font-size:4rem;margin-bottom:1rem;">⌛</div>
        <h3 class="fw-bold mb-2">Link Kadaluarsa</h3>
        <p class="text-muted mb-3">
            Maaf, link tes untuk <strong>{{ session.candidate.nama }}</strong> sudah tidak aktif.<br>
            Link berlaku hingga <strong>{{ session.expired_at|date:"d/m/Y H:i" }}</strong>.
        </p>
        <div class="alert alert-warning text-start" style="font-size:.9rem;">
            Silakan hubungi tim HR untuk mendapatkan link tes baru.
        </div>
    </div>
</div>
</body>
</html>
