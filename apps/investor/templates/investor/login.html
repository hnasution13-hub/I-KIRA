{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Investor Portal — Ikira</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#080808;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:400px;padding:24px}
.logo-area{text-align:center;margin-bottom:32px}
.logo-box{width:56px;height:56px;background:#e63329;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px}
.logo-box img{width:40px;height:40px;object-fit:contain}
.brand{font-size:22px;font-weight:600;color:#f0f0f0;letter-spacing:.5px}
.brand span{color:#e63329}
.subtitle{font-size:12px;color:#666;margin-top:4px}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:28px}
.card-title{font-size:15px;font-weight:500;color:#ccc;margin-bottom:20px;text-align:center}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:500;color:#666;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.field input{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:11px 14px;color:#f0f0f0;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.field input:focus{border-color:#e63329}
.btn{width:100%;background:#e63329;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:4px}
.btn:hover{background:#b01f17}
.error{background:rgba(230,51,41,.1);border:1px solid rgba(230,51,41,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:16px}
.footer{text-align:center;margin-top:20px;font-size:11px;color:#444}
.badge{display:inline-block;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:3px 10px;font-size:10px;color:#666;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-box">
      <img src="{% static 'images/Logo.png' %}" alt="Ikira" onerror="this.style.display='none';this.parentNode.innerHTML='<span style=color:#fff;font-size:20px;font-weight:700>I</span>'">
    </div>
    <div class="brand"><span>I</span>KIRA</div>
    <div class="subtitle">Human Resource Information System</div>
    <div class="badge">Investor Portal</div>
  </div>

  <div class="card">
    <div class="card-title">Masuk ke Dashboard Investor</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Masuk →</button>
    </form>
  </div>

  <div class="footer">
    Data bersifat konfidensial. Hanya untuk investor terdaftar.<br>
    &copy; 2026 Ikira — v2.0
  </div>
</div>
</body>
</html>
