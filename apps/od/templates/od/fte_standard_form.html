{% extends "base_dashboard.html" %}
{% block title %}{{ action }} FTE Standard{% endblock %}
{% block breadcrumb %}OD — {{ action }} FTE Standard{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
  <h4 class="fw-bold mb-0"><i class="fas fa-sliders me-2" style="color:#818cf8;"></i>{{ action }} FTE Standard</h4>
  <a href="{% url 'od:fte_standard_list' %}" class="btn btn-sm btn-outline-secondary">← Kembali</a>
</div>

<div class="card border-0 shadow-sm" style="max-width:680px;">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-medium">Departemen <span class="text-danger">*</span></label>
        <select name="department_id" class="form-select" required>
          <option value="">Pilih Departemen</option>
          {% for dept in depts %}
          <option value="{{ dept.id }}" {% if obj and obj.department_id == dept.id %}selected{% endif %}>{{ dept.nama }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-medium">Jabatan <span class="text-muted small">(opsional — kosongkan untuk level dept)</span></label>
        <select name="jabatan_id" class="form-select">
          <option value="">— Semua Jabatan dalam Dept —</option>
          {% for jab in jabatans %}
          <option value="{{ jab.id }}" {% if obj and obj.jabatan_id == jab.id %}selected{% endif %}>{{ jab.nama }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label fw-medium">FTE Ideal <span class="text-danger">*</span></label>
          <input type="number" name="fte_ideal" class="form-control" required step="0.5" min="0.5"
                 value="{{ obj.fte_ideal|default:'' }}" placeholder="Misal: 3">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-medium">FTE Minimum</label>
          <input type="number" name="fte_minimum" class="form-control" step="0.5" min="0"
                 value="{{ obj.fte_minimum|default:'1' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-medium">Tahun Referensi <span class="text-danger">*</span></label>
          <input type="number" name="tahun" class="form-control" required min="2020" max="2050"
                 value="{{ obj.tahun|default:tahun_default }}">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Dasar Perhitungan</label>
        <textarea name="dasar_perhitungan" class="form-control" rows="3"
                  placeholder="Jelaskan asumsi atau metode yang digunakan (misal: workload analysis, benchmarking, ratio)">{{ obj.dasar_perhitungan|default:'' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i> Simpan</button>
        <a href="{% url 'od:fte_standard_list' %}" class="btn btn-outline-secondary">Batal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
