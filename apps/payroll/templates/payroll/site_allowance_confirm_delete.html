{% extends 'base_dashboard.html' %}
{% block title %}Hapus Site Allowance Rule{% endblock %}
{% block content %}
<div class="card" style="max-width:480px; margin:2rem auto;">
    <div class="card-body text-center py-4">
        <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
        <h5 class="fw-bold">Hapus Aturan Tunjangan Site</h5>
        <p class="text-muted">Anda yakin ingin menghapus aturan:</p>
        <p class="fw-semibold">{{ rule }}</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-3">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">
                <i class="fas fa-trash me-1"></i>Ya, Hapus
            </button>
            <a href="{% url 'site_allowance_list' %}" class="btn btn-outline-secondary">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
