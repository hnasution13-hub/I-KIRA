{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Login Karyawan — i-Kira</title>
<link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --red:    #e63329;
    --red-dk: #b01f17;
    --bg:     #080808;
    --bg2:    #101010;
    --bg3:    #161616;
    --surface:#1c1c1c;
    --border: #2a2a2a;
    --border2:#333;
    --text:   #f0f0f0;
    --muted:  #888;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
    position: relative; overflow: hidden;
  }
  /* Noise texture */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .4;
  }
  /* Red glow background */
  body::after {
    content: ''; position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(230,51,41,.15) 0%, transparent 65%);
    top: 50%; left: 50%; transform: translate(-50%, -60%);
    pointer-events: none; z-index: 0;
  }
  /* Grid lines */
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  .login-wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 400px;
  }

  /* Logo area */
  .logo-area {
    text-align: center; margin-bottom: 28px;
  }
  .logo-wrap {
    width: 64px; height: 64px; margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-img { width: 64px; height: 64px; object-fit: contain; border-radius: 12px; display: none; }
  .logo-fb  { width: 64px; height: 64px; background: var(--red); border-radius: 12px;
              display: flex; align-items: center; justify-content: center; }
  .logo-title { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .logo-sub   { font-size: .78rem; color: var(--muted); }

  /* Card */
  .login-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }

  /* Fields */
  .field-group { margin-bottom: 18px; }
  .field-label {
    display: block; font-size: .78rem; font-weight: 600;
    color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
    margin-bottom: 7px;
  }
  .input-wrap {
    display: flex; align-items: center;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 8px; overflow: hidden;
    transition: border-color .2s;
  }
  .input-wrap:focus-within { border-color: var(--red); }
  .input-icon {
    width: 44px; min-width: 44px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: .88rem; flex-shrink: 0;
  }
  .field-input {
    flex: 1; min-width: 0;
    background: transparent; border: none; outline: none;
    padding: 12px 14px 12px 4px;
    font-size: .92rem; color: var(--text); font-family: 'DM Sans';
    width: 100%;
  }
  .field-input::placeholder { color: var(--muted); }
  /* Override browser autofill white background */
  .field-input:-webkit-autofill,
  .field-input:-webkit-autofill:hover,
  .field-input:-webkit-autofill:focus {
    -webkit-text-fill-color: var(--text);
    -webkit-box-shadow: 0 0 0 1000px var(--surface) inset;
    transition: background-color 5000s ease-in-out 0s;
    caret-color: var(--text);
  }
  /* Date input — override browser default chrome */
  input[type="date"].field-input {
    color-scheme: dark;
    padding-right: 10px;
  }
  input[type="date"].field-input::-webkit-calendar-picker-indicator {
    filter: invert(0.6);
    cursor: pointer;
    margin-right: 4px;
  }
  .btn-eye {
    width: 44px; min-width: 44px; background: transparent; border: none; cursor: pointer;
    color: var(--muted); font-size: .88rem; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: color .2s; padding: 0;
  }
  .btn-eye:hover { color: var(--text); }
  .field-hint { font-size: .75rem; color: var(--muted); margin-top: 5px; padding-left: 2px; }

  /* Alert */
  .alert-err {
    background: rgba(230,51,41,.1); border: 1px solid rgba(230,51,41,.3);
    border-radius: 8px; padding: 10px 14px;
    font-size: .85rem; color: #ff6b6b; margin-bottom: 18px;
  }

  /* Submit */
  .btn-masuk {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    background: var(--red); color: #fff;
    font-size: .95rem; font-weight: 600; font-family: 'DM Sans';
    cursor: pointer; transition: background .2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-masuk:hover { background: var(--red-dk); }

  .login-hint {
    text-align: center; margin-top: 16px;
    font-size: .78rem; color: var(--muted); line-height: 1.6;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="login-wrap">
  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-wrap">
      <img id="portalLogoImg" class="logo-img" alt="Logo">
      <div class="logo-fb" id="portalLogoFb">
        <i class="fas fa-id-badge fa-2x text-white"></i>
      </div>
    </div>
    <div class="logo-title">Portal Karyawan</div>
    <div class="logo-sub">i-Kira</div>
  </div>

  <!-- Card -->
  <div class="login-card">
    {% if messages %}
      {% for msg in messages %}
      <div class="alert-err">⚠ {{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="field-group">
        <label class="field-label">NIK / Username</label>
        <div class="input-wrap">
          <div class="input-icon"><i class="fas fa-user"></i></div>
          <input type="text" name="username" class="field-input"
                 placeholder="Masukkan NIK Anda"
                 autocomplete="username" autofocus required>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Tanggal Lahir</label>
        <div class="input-wrap">
          <div class="input-icon"><i class="fas fa-calendar-alt"></i></div>
          <input type="date" name="tanggal_lahir" class="field-input">
        </div>
        <div class="field-hint">Sebagai verifikasi identitas</div>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="input-wrap">
          <div class="input-icon"><i class="fas fa-lock"></i></div>
          <input type="password" name="password" id="inp-pw" class="field-input"
                 placeholder="Password" autocomplete="current-password" required>
          <button type="button" class="btn-eye" onclick="togglePw()">
            <i class="fas fa-eye" id="ic-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-masuk">
        <i class="fas fa-sign-in-alt"></i> Masuk
      </button>
    </form>

    <div class="login-hint">
      Username &amp; password default: NIK Anda<br>
      Hubungi HR jika lupa password
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePw() {
  var inp = document.getElementById('inp-pw');
  var ic  = document.getElementById('ic-eye');
  if (inp.type === 'password') { inp.type = 'text';     ic.className = 'fas fa-eye-slash'; }
  else                         { inp.type = 'password'; ic.className = 'fas fa-eye'; }
}
(function(){
  var img = document.getElementById('portalLogoImg');
  var fb  = document.getElementById('portalLogoFb');
  if (!img) return;
  img.src = '{% static "images/Logo.png" %}';
  img.onload  = function(){ img.style.display='block'; if(fb) fb.style.display='none'; };
  img.onerror = function(){ img.style.display='none';  if(fb) fb.style.display='flex'; };
})();
</script>
</body>
</html>
