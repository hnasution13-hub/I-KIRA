<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tes Selesai — i-Kira</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f4f6f9; font-family:'Inter',sans-serif; }
.card { border-radius:16px; border:none; box-shadow:0 4px 24px rgba(0,0,0,.08); }
</style>
</head>
<body>
<div class="container py-5" style="max-width:520px;">
  <div class="card text-center p-5">
    <div style="font-size:3.5rem;margin-bottom:16px;">✅</div>
    <h4 class="fw-bold mb-2">Tes Kraepelin Selesai!</h4>
    <p class="text-muted mb-4">
      Terima kasih, <strong>{{ sesi.get_peserta_nama }}</strong>.<br>
      Hasil tes sudah tercatat dan akan diproses oleh tim HR.
    </p>
    {% if result %}
    <div class="row g-2 mb-4">
      <div class="col-6">
        <div style="background:#f0f9ff;border-radius:10px;padding:14px;">
          <div style="font-size:1.5rem;font-weight:700;color:#3b82f6;">{{ result.skor_total }}</div>
          <div style="font-size:.72rem;color:#888;">Skor Total</div>
        </div>
      </div>
      <div class="col-6">
        <div style="background:#f0fdf4;border-radius:10px;padding:14px;">
          <div style="font-size:1.5rem;font-weight:700;color:#22c55e;">{{ result.grade }}</div>
          <div style="font-size:.72rem;color:#888;">Grade</div>
        </div>
      </div>
    </div>
    {% endif %}
    <p class="text-muted" style="font-size:.82rem;">Halaman ini dapat ditutup.</p>
  </div>
</div>
</body>
</html>
