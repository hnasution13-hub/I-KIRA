{% extends 'base_dashboard.html' %}{% block title %}Medical Check Up{% endblock %}
{% block content %}<div class="container-fluid px-4 py-3"><div class="row justify-content-center"><div class="col-lg-6">
  <div class="d-flex gap-3 align-items-center mb-3">
    <a href="{% url 'candidate_detail' candidate.pk %}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-arrow-left"></i></a>
    <h4 class="mb-0 fw-bold">Medical Check Up — {{ candidate.nama }}</h4>
  </div>
  <div class="card shadow-sm"><div class="card-body p-4">
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
      <div class="mb-3"><label class="form-label fw-semibold">Status MCU</label>
        <select name="status" class="form-select" required>
          {% for v,l in status_choices %}<option value="{{ v }}" {% if instance.status == v %}selected{% endif %}>{{ l }}</option>{% endfor %}
        </select></div>
      <div class="mb-3"><label class="form-label">Tanggal MCU</label>
        <input type="date" name="tanggal_mcu" class="form-control" value="{{ instance.tanggal_mcu|date:'Y-m-d'|default:'' }}"></div>
      <div class="mb-3"><label class="form-label">Fasilitas Kesehatan</label>
        <input type="text" name="faskes" class="form-control" value="{{ instance.faskes|default:'' }}" placeholder="Nama Klinik / RS"></div>
      <div class="mb-3"><label class="form-label">Catatan / Diagnosis</label>
        <textarea name="catatan" class="form-control" rows="3">{{ instance.catatan|default:'' }}</textarea></div>
      <div class="mb-4"><label class="form-label">File Hasil MCU (opsional)</label>
        <input type="file" name="file_hasil" class="form-control"></div>
      <div class="d-flex justify-content-end gap-2">
        <a href="{% url 'candidate_detail' candidate.pk %}" class="btn btn-outline-secondary">Batal</a>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Simpan MCU</button>
      </div>
    </form>
  </div></div>
</div></div></div>{% endblock %}
