{% extends 'base_dashboard.html' %}{% block title %}Rekomendasi HR{% endblock %}
{% block content %}<div class="container-fluid px-4 py-3"><div class="row justify-content-center"><div class="col-lg-6">
  <div class="d-flex gap-3 align-items-center mb-3">
    <a href="{% url 'candidate_detail' candidate.pk %}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-arrow-left"></i></a>
    <h4 class="mb-0 fw-bold">Rekomendasi HR — {{ candidate.nama }}</h4>
  </div>
  <div class="card shadow-sm"><div class="card-body p-4">
    <form method="post">{% csrf_token %}
      <div class="mb-4">
        <label class="form-label fw-semibold">Keputusan</label>
        {% for v,l in keputusan_choices %}
        <div class="form-check p-3 border rounded mb-2 {% if instance.keputusan == v %}border-primary bg-primary bg-opacity-5{% endif %}">
          <input class="form-check-input" type="radio" name="keputusan" value="{{ v }}" id="kep_{{ v }}"
            {% if instance.keputusan == v %}checked{% endif %} required>
          <label class="form-check-label fw-semibold" for="kep_{{ v }}">{{ l }}</label>
        </div>
        {% endfor %}
      </div>
      <div class="mb-4"><label class="form-label">Alasan / Catatan</label>
        <textarea name="alasan" class="form-control" rows="4">{{ instance.alasan|default:'' }}</textarea></div>
      <div class="d-flex justify-content-end gap-2">
        <a href="{% url 'candidate_detail' candidate.pk %}" class="btn btn-outline-secondary">Batal</a>
        <button type="submit" class="btn btn-primary"><i class="fas fa-gavel me-1"></i>Buat Keputusan</button>
      </div>
    </form>
  </div></div>
</div></div></div>{% endblock %}
