{% extends 'base_dashboard.html' %}
{% block title %}Buat Sesi Psikotes{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-3">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="d-flex align-items-center gap-3 mb-3">
        <a href="{% url 'candidate_detail' candidate.pk %}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-arrow-left"></i></a>
        <h4 class="mb-0 fw-bold">Buat Sesi Psikotes</h4>
      </div>
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="alert alert-light border mb-4">
            <strong>Kandidat:</strong> {{ candidate.nama }} — {{ candidate.jabatan_dilamar }}
          </div>
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Paket Tes yang Diujikan</label>
              {% for val, label in kategori_choices %}
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="paket" value="{{ val }}" id="kat_{{ val }}" checked>
                <label class="form-check-label" for="kat_{{ val }}">{{ label }}</label>
              </div>
              {% endfor %}
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label small">Durasi Logika (menit)</label>
                <input type="number" name="durasi_logika" class="form-control" value="15" min="5" max="60">
              </div>
              <div class="col-6">
                <label class="form-label small">Durasi Verbal (menit)</label>
                <input type="number" name="durasi_verbal" class="form-control" value="15" min="5" max="60">
              </div>
              <div class="col-6">
                <label class="form-label small">Durasi Numerik (menit)</label>
                <input type="number" name="durasi_numerik" class="form-control" value="15" min="5" max="60">
              </div>
              <div class="col-6">
                <label class="form-label small">Durasi DISC (menit)</label>
                <input type="number" name="durasi_disc" class="form-control" value="20" min="5" max="60">
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label small">Link aktif selama (hari)</label>
              <input type="number" name="expired_days" class="form-control" value="7" min="1" max="30">
            </div>
            <div class="d-flex justify-content-end gap-2">
              <a href="{% url 'candidate_detail' candidate.pk %}" class="btn btn-outline-secondary">Batal</a>
              <button type="submit" class="btn btn-primary"><i class="fas fa-link me-1"></i>Generate Link Psikotes</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
