{% extends 'base_dashboard.html' %}
{% block title %}Laporan{% endblock %}
{% block breadcrumb %}Laporan / Violation{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="fas fa-chart-bar me-2 text-primary"></i>Laporan Violation</h4>
    <div class="d-flex gap-2">
        <a href="{% url "export_violation_excel" %}?{{ request.GET.urlencode }}" class="btn btn-success btn-sm"><i class="fas fa-file-excel me-1"></i>Export Excel</a>
        <button class="btn btn-danger btn-sm" disabled title="Segera hadir"><i class="fas fa-file-pdf me-1"></i>Export PDF</button>
    </div>
</div>
<div class="card mb-3"><div class="card-body py-3">
    <form method="get" class="row g-2 align-items-end">
        <div class="col-md-2"><select name="bulan" class="form-select form-select-sm">
            <option>Januari</option><option>Februari</option><option>Maret</option>
            <option>April</option><option>Mei</option><option>Juni</option>
            <option>Juli</option><option>Agustus</option><option>September</option>
            <option>Oktober</option><option>November</option><option>Desember</option>
        </select></div>
        <div class="col-md-2"><input type="number" name="tahun" class="form-control form-control-sm" value="{{ tahun|default:'2024' }}" min="2020" max="2030"></div>
        <div class="col-md-3"><select name="department" class="form-select form-select-sm">
            <option value="">Semua Departemen</option>
            {% for d in departments %}<option value="{{ d.id }}">{{ d.nama }}</option>{% endfor %}
        </select></div>
        <div class="col-auto"><button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-search me-1"></i>Tampilkan</button></div>
    </form>
</div></div>
<div class="card"><div class="card-body text-center py-5 text-muted">
    <i class="fas fa-chart-bar fa-3x mb-3 text-primary"></i><br>
    <h5>Data laporan akan tampil di sini</h5>
    <p class="small">Filter dulu periode dan departemen, kemudian klik Tampilkan</p>
</div></div>
{% endblock %}
