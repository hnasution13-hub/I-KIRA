<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QA — Pilih Kandidat untuk Preview Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:600px">
  <div class="d-flex align-items-center gap-2 mb-4">
    <i class="fas fa-user-tie fa-2x text-danger"></i>
    <div>
      <h5 class="mb-0 fw-bold">QA — Preview Portal Kandidat</h5>
      <small class="text-muted">Pilih kandidat untuk kirim link form & preview</small>
    </div>
  </div>

  {% if candidates %}
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0 small">
        <thead class="table-light">
          <tr><th>Nama</th><th>Posisi</th><th>Status</th><th></th></tr>
        </thead>
        <tbody>
          {% for c in candidates %}
          <tr>
            <td class="fw-semibold">{{ c.nama }}</td>
            <td class="text-muted">{{ c.jabatan_dilamar }}</td>
            <td><span class="badge bg-secondary">{{ c.status }}</span></td>
            <td>
              <a href="{% url 'candidate_profile_send' c.pk %}"
                 class="btn btn-xs btn-sm btn-outline-primary py-0 px-2">
                <i class="fas fa-paper-plane me-1"></i>Kirim & Preview
              </a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
  {% else %}
  <div class="alert alert-warning">
    Belum ada kandidat. <a href="/recruitment/candidates/add/">Tambah kandidat dulu</a>.
  </div>
  {% endif %}
</div>
</body>
</html>
