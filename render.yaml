      - key: SITE_URL
        value: https://ikira-hris.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://ikira-hris.onrender.com
      - key: SALES_WA
        value: 628XXXXXXXXXX
      - key: SALES_EMAIL
        value: sales@ikira.id
      - key: RESEND_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: noreply@i-kira.com
