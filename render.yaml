services:
  - type: web
    name: ikira-hris
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn hris_project.wsgi:application --config gunicorn.conf.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: ikira-hris.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: ikira-db
          property: connectionString
      - key: SITE_URL
        value: https://ikira-hris.onrender.com
      - key: SALES_WA
        value: 628XXXXXXXXXX
      - key: SALES_EMAIL
        value: sales@ikira.id
      - key: CORS_ALLOWED_ORIGINS
        value: https://ikira-hris.onrender.com
      - key: HR_EMAIL_LIST
        value: hr@ikira.id
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: ikira-db
    databaseName: ikira_hris
    user: ikira
    plan: free
