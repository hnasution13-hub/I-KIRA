{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Berhasil Direset — i-Kira</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root { --red:#e63329; --bg:#080808; --bg2:#101010; --border:#242424; --text:#f0f0f0; --muted:#888; }
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:420px; text-align:center; }
.icon { font-size:2.5rem; color:#22c55e; margin-bottom:20px; }
h2 { font-size:1.3rem; font-weight:700; margin-bottom:8px; }
p { font-size:.84rem; color:var(--muted); line-height:1.6; margin-bottom:24px; }
.btn { display:inline-flex; align-items:center; gap:7px; padding:10px 22px; background:var(--red); color:#fff; border:none; border-radius:8px; font-family:'DM Sans'; font-size:.88rem; font-weight:600; text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="fas fa-shield-check"></i></div>
  <h2>Password Berhasil Direset!</h2>
  <p>Password Anda telah berhasil diperbarui. Sekarang Anda bisa login dengan password baru.</p>
  <a href="{% url 'login' %}" class="btn"><i class="fas fa-right-to-bracket"></i> Login Sekarang</a>
</div>
</body>
</html>
