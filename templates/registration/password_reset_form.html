{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — HRIS SmartDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root { --red:#e63329; --red-dark:#b01f17; --bg:#080808; --bg2:#101010; --surface:#1c1c1c; --border:#242424; --border2:#2e2e2e; --text:#f0f0f0; --muted:#888; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 40px; width: 100%; max-width: 420px;
}
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.logo-icon { width: 36px; height: 36px; background: var(--red); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 1.3rem; color: #fff; overflow:hidden; flex-shrink:0; }
.logo-icon img { width:36px;height:36px;object-fit:contain;border-radius:8px;display:none; }
.logo-text { font-weight: 700; font-size: .9rem; line-height: 1.2; }
.logo-text span { display: block; font-size: .7rem; color: var(--muted); font-weight: 400; }
h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
p { font-size: .84rem; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
label { display: block; font-size: .78rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: .3px; }
input[type=email] {
  width: 100%; padding: 10px 14px; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text); font-family: 'DM Sans'; font-size: .88rem;
  outline: none; transition: border-color .2s;
}
input[type=email]:focus { border-color: var(--red); }
.btn {
  width: 100%; margin-top: 20px; padding: 11px;
  background: var(--red); color: #fff; border: none;
  border-radius: 8px; font-family: 'DM Sans'; font-size: .88rem;
  font-weight: 600; cursor: pointer; transition: background .2s;
}
.btn:hover { background: var(--red-dark); }
.back { display: block; text-align: center; margin-top: 18px; font-size: .82rem; color: var(--muted); text-decoration: none; }
.back:hover { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><img id="prLogoImg" alt="Logo"><span id="prLogoFb">H</span></div>
    <div class="logo-text">HRIS SmartDesk <span>Enterprise Edition</span></div>
  </div>
  <h2>Reset Password</h2>
  <p>Masukkan alamat email akun Anda. Kami akan mengirimkan link untuk mereset password.</p>
  <form method="post">
    {% csrf_token %}
    <label for="id_email">Alamat Email</label>
    <input type="email" name="email" id="id_email" placeholder="contoh@perusahaan.com" required autofocus>
    <button type="submit" class="btn"><i class="fas fa-paper-plane" style="margin-right:7px;"></i>Kirim Link Reset</button>
  </form>
  <a href="{% url 'login' %}" class="back"><i class="fas fa-arrow-left" style="margin-right:5px;"></i>Kembali ke Login</a>
</div>
<script>
(function(){
  var img=document.getElementById('prLogoImg'),fb=document.getElementById('prLogoFb');
  if(!img)return;
  img.src="{% static 'images/Logo.png' %}";
  img.onload=function(){img.style.display='block';if(fb)fb.style.display='none';};
  img.onerror=function(){img.style.display='none';if(fb)fb.style.display='';};
})();
</script>
</body>
</html>
